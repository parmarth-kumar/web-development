<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List in HTML</title>
</head>
<body>

    <!-- unordered list -->
     <ul>
        <h4>Things to make sandwich</h4>
        <li>Bread</li>
        <li>Jam</li>
        <li>Butter</li>
     </ul>

    <!-- ordered list -->
    <!-- by default type of ol is "1" -->
     <ol type="a"> 
        <li>Bread</li>
        <li>Jam</li>
        <li>Butter</li>
     </ol>

</body>
</html>
