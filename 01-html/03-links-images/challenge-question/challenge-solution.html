<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 960px;
            margin: 40px auto;
            padding: 24px;
            background: #f4f7fb;
            color: #1f2937;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }
        figure {
            margin: 0;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }
        img {
            display: block;
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        figcaption {
            padding: 12px 14px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <h1>Photo Gallery</h1>
    <p>Click an image to open a larger version.</p>

    <section class="gallery">
        <figure>
            <a href="https://picsum.photos/id/1015/1200/800" target="_blank" rel="noopener noreferrer">
                <img src="https://picsum.photos/id/1015/600/400" alt="Mountain landscape with a river valley" height="220">
            </a>
            <figcaption>Mountain landscape</figcaption>
        </figure>

        <figure>
            <a href="https://picsum.photos/id/1025/1200/800" target="_blank" rel="noopener noreferrer">
                <img src="https://picsum.photos/id/1025/600/400" alt="Dog portrait looking at the camera" height="220">
            </a>
            <figcaption>Animal portrait</figcaption>
        </figure>

        <figure>
            <a href="https://picsum.photos/id/1035/1200/800" target="_blank" rel="noopener noreferrer">
                <img src="https://picsum.photos/id/1035/600/400" alt="Tree-lined road under a bright sky" height="220">
            </a>
            <figcaption>Travel scenery</figcaption>
        </figure>
    </section>
</body>
</html>
