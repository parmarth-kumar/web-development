<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Timetable Layout Solution</title>
</head>
<body>
    <h1>Weekly Class Timetable</h1>

    <table border="1">
        <thead>
            <tr>
                <th>Time</th>
                <th>Monday</th>
                <th>Tuesday</th>
                <th>Wednesday</th>
                <th>Thursday</th>
                <th>Friday</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>9:00 - 10:00</td>
                <td>Math</td>
                <td colspan="2">Project Lab</td>
                <td>English</td>
                <td>History</td>
            </tr>
            <tr>
                <td>10:00 - 11:00</td>
                <td rowspan="2">Science Lab</td>
                <td>Art</td>
                <td>Computer</td>
                <td>Guest Lecture</td>
                <td>Geography</td>
            </tr>
            <tr>
                <td>11:00 - 12:00</td>
                <td colspan="2">Workshop</td>
                <td>Music</td>
                <td>PE</td>
            </tr>
            <tr>
                <td>12:00 - 1:00</td>
                <td colspan="5">Lunch Break</td>
            </tr>
            <tr>
                <td>1:00 - 2:00</td>
                <td>Reading</td>
                <td>Math</td>
                <td rowspan="2">Coding Club</td>
                <td>Science</td>
                <td>Assembly</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
