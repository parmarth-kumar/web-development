<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice Q3</title>
  </head>
  <body>
    <form action="/server">
      <h1>Feedback Form</h1>

      <label for="name">Name: </label>
      <input type="text" name="name" id="name" placeholder="Write your name"/>
      <br>
      <br>

      <label for="email">Email: </label>
      <input type="email" name="email" id="email" placeholder="Write your email"/>
      <br>
      <br>

      <label for="msg">Message: </label>
      <br>
      <textarea name="msg" id="msg" rows="4" cols="40"></textarea>
      <br>
      <br>

      <label>Rate us out of 5:</label>
      <br>
      <input type="radio" name="rate" id="1"><label for="1">1</label>
      <br>
      <input type="radio" name="rate" id="2"><label for="2">2</label>
      <br>
      <input type="radio" name="rate" id="3"><label for="3">3</label>
      <br>
      <input type="radio" name="rate" id="4"><label for="4">4</label>
      <br>
      <input type="radio" name="rate" id="5"><label for="5">5</label>
      <br>
      <br>

      <button type="submit">Send your message!</button>
    </form>
  </body>
</html>
