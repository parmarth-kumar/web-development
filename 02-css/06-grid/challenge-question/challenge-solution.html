<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Grid Layout Solution</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Dashboard Grid Layout</h1>

    <div class="container">
        <header class="header">
            <h2>Header Section</h2>
        </header>

        <aside class="sidebar">
            <h3>Sidebar</h3>
            <ul>
                <li>Home</li>
                <li>Profile</li>
                <li>Settings</li>
            </ul>
        </aside>

        <main class="main">
            <h2>Main Content Area</h2>
            <p>This section displays the main content of the dashboard layout organized using CSS Grid.</p>
        </main>

        <footer class="footer">
            <p>Footer Section</p>
        </footer>
    </div>
</body>
</html>
