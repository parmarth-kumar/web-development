<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type (Element) Selector Demo</title>
    <style>
        /* Type selectors target elements by their HTML tag name */
        h2 {
            color: orange;
        }

        p {
            color: white;
            background-color: black;
            padding: 10px;
        }

        button {
            color: white;
            background-color: blue;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Hi there!</h2>
    <p>My name is Tom & I am here to help you.</p>
    <button>Need Help</button>
</body>
</html>
