<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selector Demo</title>
    <style>
        /* Class selectors start with a dot (.) and target any element with the matching class attribute */
        .highlight {
            background-color: yellow;
            font-weight: bold;
            padding: 5px;
        }

        .text-muted {
            color: gray;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>Class Selector Demo</h1>
    <p class="highlight">This paragraph is highlighted using a class selector.</p>
    <p class="text-muted">This text is muted using a class selector.</p>
    <p>This is a normal paragraph with no classes applied.</p>
</body>
</html>
