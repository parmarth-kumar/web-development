<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Selector Demo</title>
    <style>
        /* Group selectors are comma-separated tag names sharing a single CSS rule block */
        h1, h2, h3 {
            color: darkred;
            font-family: Arial, sans-serif;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>Heading 1 (Group Styled)</h1>
    <h2>Heading 2 (Group Styled)</h2>
    <h3>Heading 3 (Group Styled)</h3>
    <p>Paragraph text remains standard because it is not included in the group selector list.</p>
</body>
</html>
