<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Selector Demo</title>
    <style>
        /* The universal selector (*) targets every element in the HTML document */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Universal Selector Demo</h1>
    <p>This demo resets default browser margins and paddings and sets a monospace font globally using the universal selector (*).</p>
</body>
</html>
