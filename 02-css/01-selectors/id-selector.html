<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Selector Demo</title>
    <style>
        /* ID selectors start with a hash (#) and target unique elements with matching id attributes */
        #main-heading {
            color: navy;
            border-bottom: 2px solid navy;
            padding-bottom: 10px;
        }

        #special-action {
            background-color: green;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 id="main-heading">ID Selector Demo</h1>
    <p>IDs must be unique within a single HTML page. Only one element should share a specific ID.</p>
    <button id="special-action">Unique Action</button>
</body>
</html>
