<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Navigation Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            color: #1b4d3e;
            border-bottom: 2px solid #1b4d3e;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* Convert the vertical bulleted list items into a horizontal navigation menu */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            background-color: #1b4d3e;
            border-radius: 4px;
        }

        li {
            display: inline-block;
        }

        /* Ensure hover targets are large and fully clickable */
        a {
            display: block;
            padding: 15px 20px;
            color: white;
            text-decoration: none;
        }

        a:hover {
            background-color: #143b2f;
        }
    </style>
</head>
<body>

    <h1>Horizontal Navigation Menu</h1>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

</body>
</html>
