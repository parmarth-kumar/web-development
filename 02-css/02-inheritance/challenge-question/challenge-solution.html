<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Form Typography Solution</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Reset Form Typography via Inheritance</h1>

    <div class="parent-container">
        <h2>Parent Container (Georgia Font & Dark Blue Color)</h2>
        <p>The form fields below use inherit to match the parent font and color.</p>

        <form>
            <label for="username">Username:</label>
            <input type="text" id="username" placeholder="Enter username">

            <label for="useremail">Email:</label>
            <input type="email" id="useremail" placeholder="Enter email">

            <br>
            <button type="submit">Submit Form</button>
        </form>
    </div>
</body>
</html>
